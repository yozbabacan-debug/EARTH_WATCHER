<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Earth Watcher v4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/v4.css"/>
</head>
<body>
    <div id="map"></div>

    <!-- Master Kontrol Paneli -->
    <div id="control-panel">
        <div class="panel-header">🌍 Earth Watcher v4</div>
        <div class="risk-summary" id="risk-summary">
            <div class="stat"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">Event</span></div>
            <div class="stat"><span class="stat-val hotspot" id="stat-hotspot">0</span><span class="stat-lbl">Hotspot</span></div>
        </div>
        <div class="master-switches">
            <label class="switch-item" id="sw-physical">
                <input type="checkbox" checked onchange="toggleLayer('physical', this.checked)">
                <span class="switch-label">🌱 Cevresel & Dogal</span>
            </label>
            <label class="switch-item" id="sw-socio">
                <input type="checkbox" checked onchange="toggleLayer('socio-political', this.checked)">
                <span class="switch-label">⚡ Sosyo-Politik & Guvenlik</span>
            </label>
        </div>
        <div class="legend" id="legend"></div>
        <div class="panel-footer">
            <span id="last-update">Bekleniyor...</span>
            <button onclick="refreshData()" class="refresh-btn">🔄</button>
        </div>
    </div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/v4/app.js"></script>
</body>
</html>
